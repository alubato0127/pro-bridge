<svg width="100%" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cable" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#10a37f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9d1d9"/>
      <stop offset="100%" stop-color="#f0f6fc"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- panel: dark so it reads on both light and dark GitHub themes -->
  <rect x="2" y="2" width="1196" height="356" rx="22" fill="#0d1117" stroke="#21262d" stroke-width="2"/>

  <!-- title + tagline -->
  <text x="600" y="118" text-anchor="middle" font-size="80" font-weight="800" fill="url(#title)" letter-spacing="-2">pro-bridge</text>
  <text x="600" y="160" text-anchor="middle" font-size="23" fill="#8b949e">Talk to web-only GPT&#8201;Pro from any MCP client — through your real browser</text>

  <!-- suspension bridge -->
  <g stroke-linecap="round">
    <!-- deck -->
    <line x1="150" y1="300" x2="1050" y2="300" stroke="#30363d" stroke-width="4"/>
    <!-- towers -->
    <line x1="430" y1="300" x2="430" y2="212" stroke="#484f58" stroke-width="5"/>
    <line x1="770" y1="300" x2="770" y2="212" stroke="#484f58" stroke-width="5"/>
    <!-- main cable -->
    <path d="M150,288 C 300,200 360,205 430,212 C 540,224 660,224 770,212 C 840,205 900,200 1050,288"
          fill="none" stroke="url(#cable)" stroke-width="5"/>
    <!-- suspenders -->
    <g stroke="#30363d" stroke-width="2">
      <line x1="220" y1="247" x2="220" y2="300"/>
      <line x1="290" y1="222" x2="290" y2="300"/>
      <line x1="360" y1="210" x2="360" y2="300"/>
      <line x1="500" y1="219" x2="500" y2="300"/>
      <line x1="600" y1="224" x2="600" y2="300"/>
      <line x1="700" y1="219" x2="700" y2="300"/>
      <line x1="840" y1="210" x2="840" y2="300"/>
      <line x1="910" y1="222" x2="910" y2="300"/>
      <line x1="980" y1="247" x2="980" y2="300"/>
    </g>
  </g>

  <!-- endpoint nodes -->
  <g filter="url(#glow)">
    <circle cx="150" cy="300" r="16" fill="#a371f7"/>
    <circle cx="1050" cy="300" r="16" fill="#10a37f"/>
  </g>
  <text x="150" y="345" text-anchor="middle" font-size="18" fill="#8b949e">MCP client</text>
  <text x="1050" y="345" text-anchor="middle" font-size="18" fill="#8b949e">GPT&#8201;Pro</text>
</svg>
